<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UnlockHub - Pagamento Seguro</title>
<link rel="stylesheet" href="style.css">

<style>
/* (TODO SEU CSS ORIGINAL — NÃO MUDEI NADA) */
.lock { font-size: 42px; animation: float 2s ease-in-out infinite; color: #ff0000; margin-bottom: 10px; }
@keyframes float { 0%{transform:translateY(0)}50%{transform:translateY(-6px)}100%{transform:translateY(0)} }
.secure-text { font-size:14px;color:#bbb;margin-bottom:15px }
.bank-badge { display:inline-block;padding:6px 14px;border-radius:20px;font-size:12px;background:#111;border:1px solid #00ff88;color:#00ff88;margin-bottom:15px }
.ssl-badge { font-size:12px;color:#00ff88;animation:pulseSSL 2s infinite;margin-bottom:20px }
@keyframes pulseSSL {0%{opacity:.6}50%{opacity:1}100%{opacity:.6}}
.counter { margin-top:20px;font-size:13px;color:#aaa }
.social-proof { margin-top:15px;font-size:13px;color:#ccc }
.form-social { display:flex;justify-content:center;gap:20px;margin-top:25px }
.form-social a { width:45px;height:45px;border-radius:50%;border:2px solid #ff0000;display:flex;justify-content:center;align-items:center;box-shadow:0 0 15px #ff0000;transition:.3s;animation:pulse 2s infinite }
.form-social a:hover { transform:scale(1.1);box-shadow:0 0 30px #ff0000 }
@keyframes pulse {0%{box-shadow:0 0 10px #ff0000}50%{box-shadow:0 0 25px #ff0000}100%{box-shadow:0 0 10px #ff0000}}
.form-social svg { width:22px;height:22px;fill:white }
</style>
</head>

<body>

<div class="card">

  <div class="lock">🔒</div>
  <h1>Unlock<span>Hub</span></h1>

  <div class="bank-badge">🔐 Proteção Bancária 256-bit</div>
  <div class="ssl-badge">✔ SSL Seguro & Criptografado</div>

  <p class="secure-text">
    Ambiente 100% seguro. Seus dados são protegidos com tecnologia de nível bancário.
  </p>

  <!-- FORM SEM ACTION -->
  <form id="formPagamento">

    <input type="text" id="nome" placeholder="Nome completo" required>
    <input type="text" id="whatsapp" placeholder="WhatsApp" required>
    <input type="text" id="servico" placeholder="Serviço contratado" required>
    <input type="email" id="email" placeholder="E-mail" required>
    <input type="text" id="valor" placeholder="Valor (R$)" required>

    <button type="submit">Gerar Pix</button>

  </form>

  <div class="counter">🔥 +3.482 clientes atendidos com sucesso</div>
  <div class="social-proof">⭐⭐⭐⭐⭐ 4.9/5 Avaliação média dos clientes</div>

</div>

<script>
// Máscara valor
const input = document.getElementById('valor');
input.addEventListener('input', e => {
  let v = e.target.value.replace(/\D/g, '');
  v = (v / 100).toFixed(2).replace('.', ',');
  v = v.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  e.target.value = v;
});

// SUBMIT CORRETO
document.getElementById("formPagamento").addEventListener("submit", async (e) => {
  e.preventDefault();

  const dados = {
    nome: document.getElementById("nome").value,
    whatsapp: document.getElementById("whatsapp").value,
    servico: document.getElementById("servico").value,
    email: document.getElementById("email").value,
    valor: document.getElementById("valor").value.replace(/\D/g, '') / 100
  };

  const res = await fetch("/api/pagar", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(dados)
  });

  const json = await res.json();

  if (!json.ok) {
    alert(json.error);
    return;
  }

  alert("PIX gerado com sucesso! Confira o QR Code.");
});
</script>

</body>
</html>
