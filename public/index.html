<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>KS Pay - Pagamento</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .hidden {
      display: none;
    }

    .qr img {
      width: 100%;
      margin-top: 15px;
    }

    .copy-box {
      background: #0f172a;
      padding: 10px;
      border-radius: 6px;
      word-break: break-all;
      font-size: 12px;
    }

    .status {
      margin-top: 10px;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="container">

  <h2>Pagamento via PIX</h2>

  <form id="formPagamento">
    <input type="text" id="nome" placeholder="Nome completo" required />
    <input type="email" id="email" placeholder="Email" required />
    <input type="text" id="whatsapp" placeholder="WhatsApp" required />
    <input type="text" id="servico" placeholder="Serviço" required />
    <input type="number" id="valor" placeholder="Valor (R$)" required />
    <button type="submit">Gerar PIX</button>
  </form>

  <div id="areaPix" class="hidden">
    <div class="qr" id="qrContainer"></div>

    <h4>PIX Copia e Cola</h4>
    <div class="copy-box" id="pixCode"></div>
    <button onclick="copiarPix()">Copiar Código</button>

    <div class="status" id="statusPagamento">
      Aguardando pagamento...
    </div>
  </div>

</div>

<script>
  const form = document.getElementById("formPagamento");
  const areaPix = document.getElementById("areaPix");
  const qrContainer = document.getElementById("qrContainer");
  const pixCode = document.getElementById("pixCode");
  const statusPagamento = document.getElementById("statusPagamento");

  let paymentId = null;
  let intervalStatus = null;

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const dados = {
      nome: document.getElementById("nome").value,
      email: document.getElementById("email").value,
      whatsapp: document.getElementById("whatsapp").value,
      servico: document.getElementById("servico").value,
      valor: document.getElementById("valor").value
    };

    try {
      const response = await fetch("/api/pagar", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(dados)
      });

      const result = await response.json();

      if (!result.ok) {
        alert(result.error);
        return;
      }

      paymentId = result.paymentId;

      areaPix.classList.remove("hidden");

      pixCode.innerText = result.qrCode;

      qrContainer.innerHTML = `
        <img src="data:image/png;base64,${result.qrBase64}" />
      `;

      verificarStatus();

    } catch (error) {
      alert("Erro ao gerar pagamento.");
    }
  });

  function copiarPix() {
    navigator.clipboard.writeText(pixCode.innerText);
    alert("Código PIX copiado!");
  }

  function verificarStatus() {
    intervalStatus = setInterval(async () => {
      if (!paymentId) return;

      const response = await fetch(`/api/status?paymentId=${paymentId}`);
      const result = await response.json();

      if (result.status === "approved") {
        statusPagamento.innerText = "Pagamento aprovado ✅";
        statusPagamento.style.color = "#22c55e";
        clearInterval(intervalStatus);
      }

      if (result.status === "rejected") {
        statusPagamento.innerText = "Pagamento rejeitado ❌";
        statusPagamento.style.color = "#ef4444";
        clearInterval(intervalStatus);
      }

    }, 5000);
  }
</script>

</body>
</html>
