<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KSPay</title>

<style>
body {
  background-color: #0d0d0d;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  color: white;
}

.container {
  background: #1a1a1a;
  padding: 30px;
  border-radius: 12px;
  width: 350px;
  box-shadow: 0 0 25px rgba(255,0,0,0.3);
  text-align: center;
}

h2 {
  color: #ff0000;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 12px;
  border: none;
  border-radius: 6px;
  background: #2a2a2a;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 6px;
  background: #ff0000;
  color: white;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
  transition: 0.3s;
}

button:hover {
  background: #cc0000;
}

#pagamento, #sucesso {
  display: none;
}

textarea {
  width: 100%;
  margin-top: 10px;
  background: #2a2a2a;
  color: white;
  border: none;
  border-radius: 6px;
  padding: 8px;
}

.copy-btn {
  background: #444;
}

.copy-btn:hover {
  background: #666;
}

.check {
  font-size: 80px;
  color: #00ff66;
  animation: pop 0.5s ease-in-out;
}

@keyframes pop {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
</style>
</head>
<body>

<div class="container">

  <div id="formulario">
    <h2>KSPay</h2>

    <form id="form">
      <input type="text" placeholder="Nome" id="nome" required>
      <input type="text" placeholder="WhatsApp" id="whatsapp" required>
      <input type="text" placeholder="Marca do aparelho" id="aparelho" required>
      <input type="text" placeholder="Serviço contratado" id="servico" required>
      <input type="email" placeholder="Email" id="email" required>
      <input type="number" placeholder="Valor (R$)" id="valor" required>
      <button type="submit">Gerar Pix</button>
    </form>
  </div>

  <div id="pagamento">
    <h3>Escaneie o QR Code</h3>
    <img id="qr" width="200"><br>

    <textarea id="pixCode" rows="4" readonly></textarea>
    <button class="copy-btn" onclick="copiarPix()">Copiar Pix</button>

    <p id="status">
      Aguardando pagamento...
    </p>
  </div>

  <div id="sucesso">
    <div class="check">✔</div>
    <h3>Pagamento Aprovado!</h3>
    <p>Redirecionando para atendimento...</p>
  </div>

</div>

<script>
document.getElementById("form").addEventListener("submit", async function(e){
  e.preventDefault();

  const dados = {
    nome: nome.value,
    whatsapp: whatsapp.value,
    aparelho: aparelho.value,
    servico: servico.value,
    email: email.value,
    valor: valor.value
  };

  const resposta = await fetch("/criar-pagamento", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(dados)
  });

  const pagamento = await resposta.json();

  document.getElementById("formulario").style.display = "none";
  document.getElementById("pagamento").style.display = "block";

  document.getElementById("qr").src =
    "data:image/png;base64," + pagamento.qr_base64;

  document.getElementById("pixCode").value = pagamento.qr_code;

  verificarStatus(pagamento.id);
});

function copiarPix() {
  const pix = document.getElementById("pixCode");
  pix.select();
  document.execCommand("copy");
  alert("Pix copiado com sucesso!");
}

async function verificarStatus(id) {
  const intervalo = setInterval(async () => {
    const res = await fetch("/status/" + id);
    const data = await res.json();

    if (data.status === "approved") {
      clearInterval(intervalo);

      document.getElementById("pagamento").style.display = "none";
      document.getElementById("sucesso").style.display = "block";

      setTimeout(() => {
        window.location.href =
          "https://wa.me/5586994948442";
      }, 4000);
    }
  }, 5000);
}
</script>

</body>
</html>
