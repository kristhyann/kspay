<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UnlockHub - Pagamento Seguro</title>
<link rel="stylesheet" href="style.css">

<style>
/* Cadeado animado */
.lock {
    font-size: 40px;
    animation: float 2s ease-in-out infinite;
    color: #ff0000;
    margin-bottom: 10px;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-6px); }
    100% { transform: translateY(0px); }
}

/* Texto seguro */
.secure-text {
    font-size: 14px;
    color: #bbb;
    margin-bottom: 25px;
}

/* Ícones sociais dentro do formulário */
.form-social {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
}

.form-social a {
    font-size: 22px;
    text-decoration: none;
    color: white;
    border: 2px solid #ff0000;
    padding: 10px 14px;
    border-radius: 50px;
    box-shadow: 0 0 15px #ff0000;
    transition: 0.3s;
    animation: pulse 2s infinite;
}

.form-social a:hover {
    transform: scale(1.1);
    box-shadow: 0 0 25px #ff0000;
}

@keyframes pulse {
    0% { box-shadow: 0 0 10px #ff0000; }
    50% { box-shadow: 0 0 25px #ff0000; }
    100% { box-shadow: 0 0 10px #ff0000; }
}
</style>

</head>
<body>

<div class="card">

    <div class="lock">🔒</div>
    <h1>Unlock<span>Hub</span></h1>
    <p class="secure-text">Ambiente 100% seguro e protegido por criptografia.</p>

    <form action="/pagar" method="POST">

        <input type="text" name="nome" placeholder="Nome completo" required>

        <input type="text" name="whatsapp" placeholder="WhatsApp" required>

        <input type="text" name="servico" placeholder="Serviço contratado" required>

        <input type="email" name="email" placeholder="E-mail" required>

        <input type="text" name="valor" id="valor" placeholder="Valor (R$)" required>

        <button type="submit">Gerar Pix</button>

    </form>

    <!-- Instagram + WhatsApp -->
    <div class="form-social">
        <a href="https://wa.me/5586994948442" target="_blank">📱</a>
        <a href="https://www.instagram.com/unlockhu_b/" target="_blank">📸</a>
    </div>

</div>

<script>
// Máscara automática valor 1.000,00
const input = document.getElementById('valor');

input.addEventListener('input', function(e) {

    let value = e.target.value.replace(/\D/g, '');

    value = (value / 100).toFixed(2) + '';

    value = value.replace(".", ",");

    value = value.replace(/\B(?=(\d{3})+(?!\d))/g, ".");

    e.target.value = value;

});
</script>

</body>
</html>
