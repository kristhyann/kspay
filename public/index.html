<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UnlockHub</title>

<style>
body {
  background-color: #000;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  color: white;
}

/* Container principal */
.container {
  background: #111;
  padding: 35px;
  border-radius: 20px;
  width: 380px;
  text-align: center;
  position: relative;
  box-shadow: 0 0 25px rgba(255,0,0,0.4);
}

/* Logo */
.logo {
  width: 200px;
  margin-bottom: 20px;
  filter: drop-shadow(0 0 15px red);
}

/* Instagram botão neon */
.instagram-btn {
  position: absolute;
  top: -25px;
  right: -25px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  border: 3px solid red;
  box-shadow: 0 0 15px red, 0 0 30px red;
  transition: 0.3s;
  text-decoration: none;
}

.instagram-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 25px red, 0 0 50px red;
}

.instagram-btn img {
  width: 30px;
}

/* Inputs */
input {
  width: 100%;
  padding: 10px;
  margin-bottom: 12px;
  border: none;
  border-radius: 8px;
  background: #222;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: red;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #cc0000;
}

.copy-btn {
  background: #333;
}

#pagamento, #sucesso {
  display: none;
}

textarea {
  width: 100%;
  margin-top: 10px;
  background: #222;
  color: white;
  border: none;
  border-radius: 8px;
  padding: 8px;
}

.check {
  font-size: 80px;
  color: #00ff66;
  text-shadow: 0 0 20px #00ff66;
}
</style>
</head>
<body>

<div class="container">

<a href="https://www.instagram.com/unlockhu_b/" 
   target="_blank" 
   class="instagram-btn">
   <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
</a>

<img src="logo.jpg" class="logo">

<div id="formulario">
<form id="form">
<input type="text" placeholder="Nome" id="nome" required>
<input type="text" placeholder="WhatsApp" id="whatsapp" required>
<input type="text" placeholder="Marca do aparelho" id="aparelho" required>
<input type="text" placeholder="Serviço contratado" id="servico" required>
<input type="email" placeholder="Email" id="email" required>
<input type="number" placeholder="Valor (R$)" id="valor" required>
<button type="submit">Gerar Pix</button>
</form>
</div>

<div id="pagamento">
<h3>Escaneie o QR Code</h3>
<img id="qr" width="200"><br>
<textarea id="pixCode" rows="4" readonly></textarea>
<button class="copy-btn" onclick="copiarPix()">Copiar Pix</button>
<p>Aguardando pagamento...</p>
</div>

<div id="sucesso">
<div class="check">✔</div>
<h3>Pagamento Aprovado!</h3>
<p>Redirecionando para atendimento...</p>
</div>

</div>

<script>
document.getElementById("form").addEventListener("submit", async function(e){
e.preventDefault();

const dados = {
nome: nome.value,
whatsapp: whatsapp.value,
aparelho: aparelho.value,
servico: servico.value,
email: email.value,
valor: valor.value
};

const resposta = await fetch("/criar-pagamento", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify(dados)
});

const pagamento = await resposta.json();

document.getElementById("formulario").style.display = "none";
document.getElementById("pagamento").style.display = "block";

document.getElementById("qr").src =
"data:image/png;base64," + pagamento.qr_base64;

document.getElementById("pixCode").value = pagamento.qr_code;

verificarStatus(pagamento.id);
});

function copiarPix() {
const pix = document.getElementById("pixCode");
pix.select();
document.execCommand("copy");
alert("Pix copiado!");
}

async function verificarStatus(id) {
const intervalo = setInterval(async () => {
const res = await fetch("/status/" + id);
const data = await res.json();

if (data.status === "approved") {
clearInterval(intervalo);

document.getElementById("pagamento").style.display = "none";
document.getElementById("sucesso").style.display = "block";

setTimeout(() => {
window.location.href =
"https://wa.me/5586994948442";
}, 4000);
}
}, 5000);
}
</script>

</body>
</html>
