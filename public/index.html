<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unlockhub Serve | Pagamento PIX</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    background: #0b0b0b;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    width: 420px;
    background: #111;
    padding: 35px;
    border-radius: 14px;
    box-shadow: 0 0 40px rgba(255, 0, 0, 0.15);
    border: 1px solid #1f1f1f;
}

.logo {
    text-align: center;
    margin-bottom: 25px;
}

.logo h1 {
    color: #ff1e1e;
    font-size: 24px;
    letter-spacing: 1px;
}

.subtitle {
    text-align: center;
    color: #888;
    font-size: 13px;
    margin-bottom: 30px;
}

input {
    width: 100%;
    padding: 13px;
    margin-bottom: 18px;
    border-radius: 8px;
    border: 1px solid #222;
    background: #1a1a1a;
    color: #fff;
    font-size: 14px;
    transition: 0.2s;
}

input:focus {
    border-color: #ff1e1e;
    outline: none;
}

button {
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    border: none;
    background: #ff1e1e;
    color: #fff;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #cc0000;
}

#qrSection {
    margin-top: 25px;
    display: none;
    text-align: center;
}

#qrImage {
    width: 220px;
    margin: 15px 0;
}

textarea {
    width: 100%;
    height: 90px;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #222;
    background: #1a1a1a;
    color: #fff;
    resize: none;
    font-size: 12px;
}

.success {
    margin-top: 25px;
    text-align: center;
    font-size: 18px;
    color: #00ff88;
}
</style>
</head>

<body>

<div class="container" id="container">

    <div class="logo">
        <h1>UNLOCKHUB SERVE</h1>
    </div>

    <div class="subtitle">
        Pagamento seguro via PIX
    </div>

    <input type="text" id="nome" placeholder="Seu nome">
    <input type="email" id="email" placeholder="Seu email">
    <input type="text" id="valor" placeholder="Valor (0,00)">

    <button type="button" onclick="gerarPix()">GERAR PIX</button>

    <div id="qrSection">
        <h3>Escaneie o QR Code</h3>
        <img id="qrImage">
        <p>Ou copie o código:</p>
        <textarea id="pixCode" readonly></textarea>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
