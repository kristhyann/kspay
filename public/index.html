<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSPAY - Pagamento</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">

    <h1>KSPAY <span>PIX</span></h1>
    <p class="subtitle">Pagamento rápido e seguro</p>

    <!-- FORMULÁRIO -->
    <form id="formPagamento">

        <input type="text" id="nome" placeholder="Seu nome" required>

        <input type="text" id="whatsapp" placeholder="WhatsApp" required
            pattern="[0-9]+"
            oninput="this.value = this.value.replace(/[^0-9]/g,'')">

        <input type="text" id="servico" placeholder="Serviço" required>

        <input type="email" id="email" placeholder="E-mail" required>

        <input type="text" id="valor" placeholder="Valor (ex: 50.00)" required
            pattern="[0-9.]+"
            oninput="this.value = this.value.replace(/[^0-9.]/g,'')">

        <button type="submit" id="btnGerar">Gerar Pix</button>

        <div class="secure">
            🔒 Ambiente 100% seguro
        </div>

    </form>

    <!-- ÁREA PIX -->
    <div id="pixArea" class="hidden">

        <h2 style="color:white;margin-bottom:15px;">Escaneie o QR Code</h2>

        <div id="qrWrap" style="margin-bottom:20px;"></div>

        <textarea id="pixCode"
            style="width:100%;padding:10px;border-radius:10px;background:#111;color:white;border:1px solid #333;"
            rows="4" readonly></textarea>

        <button onclick="copiarPix()" style="margin-top:10px;">Copiar código PIX</button>

        <button onclick="novoPix()" style="margin-top:10px;background:#222;border:1px solid #ff0000;">
            Gerar Novo Pix
        </button>

    </div>

</div>

<script>

const form = document.getElementById("formPagamento");
const btnGerar = document.getElementById("btnGerar");
const pixArea = document.getElementById("pixArea");

form.addEventListener("submit", async function (e) {
    e.preventDefault();

    if (btnGerar.disabled) return;

    btnGerar.disabled = true;
    btnGerar.textContent = "Gerando PIX... Aguarde";

    const dados = {
        nome: document.getElementById("nome").value.trim(),
        whatsapp: document.getElementById("whatsapp").value.trim(),
        servico: document.getElementById("servico").value.trim(),
        email: document.getElementById("email").value.trim(),
        valor: document.getElementById("valor").value.trim()
    };

    try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 30000);

        const response = await fetch("/api/pagar", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(dados),
            signal: controller.signal
        });

        clearTimeout(timeout);

        if (!response.ok) {
            throw new Error("Servidor demorou para responder.");
        }

        const data = await response.json();

        if (!data.ok) {
            throw new Error(data.error || "Erro ao gerar PIX.");
        }

        // Mostrar PIX apenas se sucesso
        form.classList.add("hidden");
        pixArea.classList.remove("hidden");

        if (data.qrBase64) {
            document.getElementById("qrWrap").innerHTML =
                `<img src="data:image/png;base64,${data.qrBase64}" alt="QR Code" style="width:220px;">`;
        }

        document.getElementById("pixCode").value = data.qrCode;

    } catch (err) {
        alert("Servidor iniciando. Aguarde alguns segundos e tente novamente.");
        btnGerar.disabled = false;
        btnGerar.textContent = "Gerar Pix";
    }
});

function copiarPix() {
    const codigo = document.getElementById("pixCode");
    codigo.select();
    document.execCommand("copy");
    alert("Código PIX copiado!");
}

function novoPix() {
    pixArea.classList.add("hidden");
    form.classList.remove("hidden");
    form.reset();
    btnGerar.disabled = false;
    btnGerar.textContent = "Gerar Pix";
}

</script>

</body>
</html>
