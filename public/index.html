<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UnlockHub Pay</title>

<style>
body {
  background-color: #000;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  color: white;
}

.container {
  background: #111;
  padding: 35px;
  border-radius: 20px;
  width: 380px;
  text-align: center;
  position: relative;
  box-shadow: 0 0 30px rgba(255,0,0,0.4);
}

.logo {
  width: 220px;
  margin-bottom: 20px;
  filter: drop-shadow(0 0 20px red);
}

.instagram-btn {
  position: absolute;
  top: -25px;
  right: -25px;
  width: 65px;
  height: 65px;
  border-radius: 50%;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  border: 3px solid red;
  box-shadow: 0 0 20px red, 0 0 40px red;
  transition: 0.3s;
}

.instagram-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 30px red, 0 0 60px red;
}

.instagram-btn img {
  width: 32px;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 12px;
  border: none;
  border-radius: 8px;
  background: #222;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: red;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #cc0000;
}

.copy-btn {
  background: #333;
}

#pagamento, #sucesso {
  display: none;
}

textarea {
  width: 100%;
  margin-top: 10px;
  background: #222;
  color: white;
  border: none;
  border-radius: 8px;
  padding: 8px;
}

.check {
  font-size: 80px;
  color: #00ff66;
  text-shadow: 0 0 20px #00ff66;
}

/* Rodapé */
.footer {
  margin-top: 20px;
  font-size: 12px;
  color: #aaa;
  border-top: 1px solid #333;
  padding-top: 15px;
}
</style>
</head>
<body>

<div class="container">

<a href="https://www.instagram.com/unlockhu_b/" 
   target="_blank" 
   class="instagram-btn">
   <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
</a>

<img src="/logo.jpg?v=3" class="logo">

<div id="formulario">
<form id="form">
<input type="text" placeholder="Nome" id="nome" required>
<input type="text" placeholder="WhatsApp" id="whatsapp" required>
<input type="text" placeholder="Marca do aparelho" id="aparelho" required>
<input type="text" placeholder="Serviço contratado" id="servico" required>
<input type="email" placeholder="Email" id="email" required>

<!-- VALOR FORMATADO -->
<input type="text" placeholder="Valor (R$)" id="valor" required>

<button type="submit">Gerar Pix</button>
</form>
</div>

<div id="pagamento">
<h3>Escaneie o QR Code</h3>
<img id="qr" width="200"><br>
<textarea id="pixCode" rows="4" readonly></textarea>
<button class="copy-btn" onclick="copiarPix()">Copiar Pix</button>
<p>Aguardando pagamento...</p>
</div>

<div id="sucesso">
<div class="check">✔</div>
<h3>Pagamento Aprovado!</h3>
<p>Redirecionando para atendimento...</p>
</div>

<div class="footer">
🔒 Seus dados estão protegidos com criptografia segura.<br>
Pagamento processado via Mercado Pago.<br>
© 2026 UnlockHub – Todos os direitos reservados.
</div>

</div>

<script>

/* FORMATAÇÃO MONETÁRIA AUTOMÁTICA */
const valorInput = document.getElementById("valor");

valorInput.addEventListener("input", function(e) {
  let value = e.target.value.replace(/\D/g, "");
  value = (Number(value) / 100).toFixed(2) + "";
  value = value.replace(".", ",");
  value = value.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  e.target.value = value;
});

/* ENVIO DO FORMULÁRIO */
document.getElementById("form").addEventListener("submit", async function(e){
e.preventDefault();

let valorLimpo = valor.value
  .replace(/\./g, "")
  .replace(",", ".");

const dados = {
nome: nome.value,
whatsapp: whatsapp.value,
aparelho: aparelho.value,
servico: servico.value,
email: email.value,
valor: valorLimpo
};

const resposta = await fetch("/criar-pagamento", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify(dados)
});

const pagamento = await resposta.json();

document.getElementById("formulario").style.display = "none";
document.getElementById("pagamento").style.display = "block";

document.getElementById("qr").src =
"data:image/png;base64," + pagamento.qr_base64;

document.getElementById("pixCode").value = pagamento.qr_code;

verificarStatus(pagamento.id);
});

function copiarPix() {
const pix = document.getElementById("pixCode");
pix.select();
document.execCommand("copy");
alert("Pix copiado!");
}

async function verificarStatus(id) {
const intervalo = setInterval(async () => {
const res = await fetch("/status/" + id);
const data = await res.json();

if (data.status === "approved") {
clearInterval(intervalo);

document.getElementById("pagamento").style.display = "none";
document.getElementById("sucesso").style.display = "block";

setTimeout(() => {
window.location.href =
"https://wa.me/5586994948442";
}, 4000);
}
}, 5000);
}
</script>

</body>
</html>
