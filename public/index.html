<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>UNLOCKHUB SERVE - Pagamento PIX</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background-color: #0f172a;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
            color: #fff;
        }

        .container {
            max-width: 420px;
            margin: 60px auto;
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0,0,0,0.4);
        }

        h1 {
            text-align: center;
            margin-bottom: 5px;
            font-size: 22px;
        }

        .subtitle {
            text-align: center;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 25px;
        }

        input, button, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: none;
            font-size: 15px;
        }

        input, textarea {
            background: #334155;
            color: #fff;
        }

        button {
            background: #00ff88;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #00cc6a;
        }

        #qrSection {
            display: none;
            margin-top: 20px;
            text-align: center;
        }

        #qrImage {
            width: 220px;
            margin: 15px auto;
        }

        textarea {
            height: 80px;
            resize: none;
        }

        .success {
            text-align: center;
            font-size: 20px;
            color: #00ff88;
            margin-top: 20px;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.5; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container" id="container">

    <h1>UNLOCKHUB SERVE</h1>
    <div class="subtitle">Pagamento via PIX seguro</div>

    <input type="text" id="nome" placeholder="Seu nome">
    <input type="email" id="email" placeholder="Seu email">
    <input type="text" id="valor" placeholder="Valor (0,00)">

    <button onclick="gerarPix()">GERAR PIX</button>

    <div id="qrSection">
        <h3>Escaneie o QR Code</h3>

        <img id="qrImage" src="">

        <p>Ou copie o código:</p>
        <textarea id="pixCode" readonly></textarea>
    </div>

</div>

<script src="script.js"></script>

<script>
function mostrarAprovado() {
    const container = document.getElementById("container");
    container.innerHTML = `
        <div class="success">
            PAGAMENTO APROVADO ✅
            <p style="font-size:14px;color:#94a3b8;margin-top:10px;">
                Seu pagamento foi confirmado com sucesso.
            </p>
        </div>
    `;
}
</script>

</body>
</html>
