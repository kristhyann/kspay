<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KSPay</title>

<style>
body {
  background-color: #0d0d0d;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  color: white;
}

.container {
  background: #1a1a1a;
  padding: 30px;
  border-radius: 12px;
  width: 350px;
  box-shadow: 0 0 20px rgba(255,0,0,0.3);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #ff0000;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 12px;
  border: none;
  border-radius: 6px;
  background: #2a2a2a;
  color: white;
}

input:focus {
  outline: 2px solid #ff0000;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 6px;
  background: #ff0000;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #cc0000;
}

#pagamento {
  display: none;
  text-align: center;
}

textarea {
  width: 100%;
  margin-top: 10px;
  background: #2a2a2a;
  color: white;
  border: none;
  border-radius: 6px;
  padding: 8px;
}

.status {
  margin-top: 10px;
  color: #ff4444;
}
</style>
</head>
<body>

<div class="container">
  <h2>KSPay</h2>

  <form id="form">
    <input type="text" placeholder="Nome" id="nome" required>
    <input type="text" placeholder="WhatsApp" id="whatsapp" required>
    <input type="text" placeholder="Marca do aparelho" id="aparelho" required>
    <input type="text" placeholder="Serviço contratado" id="servico" required>
    <input type="email" placeholder="Email" id="email" required>
    <input type="number" placeholder="Valor (R$)" id="valor" required>

    <button type="submit">Gerar Pix</button>
  </form>

  <div id="pagamento">
    <h3>Escaneie o QR Code</h3>
    <img id="qr" width="200"><br>
    <textarea id="pixCode" rows="4"></textarea>
    <p class="status" id="status">
      Aguarde enquanto o pagamento está sendo aprovado...
    </p>
  </div>
</div>

<script>
document.getElementById("form").addEventListener("submit", async function(e){
  e.preventDefault();

  const dados = {
    nome: nome.value,
    whatsapp: whatsapp.value,
    aparelho: aparelho.value,
    servico: servico.value,
    email: email.value,
    valor: valor.value
  };

  const resposta = await fetch("/criar-pagamento", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(dados)
  });

  const pagamento = await resposta.json();

  document.getElementById("form").style.display = "none";
  document.getElementById("pagamento").style.display = "block";

  document.getElementById("qr").src =
    "data:image/png;base64," + pagamento.qr_base64;

  document.getElementById("pixCode").value = pagamento.qr_code;

  verificarStatus(pagamento.id);
});

async function verificarStatus(id) {
  const intervalo = setInterval(async () => {
    const res = await fetch("/status/" + id);
    const data = await res.json();

    if (data.status === "approved") {
      clearInterval(intervalo);
      document.getElementById("status").innerText =
        "Pagamento aprovado! Redirecionando...";

      setTimeout(() => {
        window.location.href =
          "https://wa.me/5586994948442";
      }, 3000);
    }
  }, 5000);
}
</script>

</body>
</html>
