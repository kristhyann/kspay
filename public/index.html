<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>UnlockHub - Pagamento</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <h1>Unlock<span>Hub</span></h1>
    <p class="subtitle">Pagamento seguro via Pix</p>

    <form action="/pagar" method="POST">

        <input type="text" name="nome" placeholder="Nome completo" required>

        <input type="text" name="whatsapp" placeholder="WhatsApp" required>

        <input type="text" name="servico" placeholder="Serviço contratado" required>

        <input type="email" name="email" placeholder="E-mail" required>

        <input type="number" name="valor" placeholder="Valor (R$)" required min="1" step="0.01">

        <button type="submit">Gerar Pix</button>

    </form>

    <p class="secure">🔒 Ambiente 100% seguro</p>
</div>

</body>
</html>
