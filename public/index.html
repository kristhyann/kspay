<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagamento PIX</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: #1e293b;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  width: 350px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-size: 18px;
  margin-bottom: 15px;
  text-align: center;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #22c55e;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

img {
  margin-top: 20px;
}
</style>
</head>
<body>

<div class="box">
<h2>Pagamento PIX</h2>

<input type="text" id="valor" placeholder="Digite o valor">

<button onclick="pagar()">Gerar PIX</button>

<div id="qr"></div>
</div>

<script>
const input = document.getElementById("valor");

input.addEventListener("input", function (e) {
  let value = e.target.value.replace(/\D/g, "");
  value = (value / 100).toFixed(2) + "";
  value = value.replace(".", ",");
  value = value.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  e.target.value = value;
});

async function pagar() {
  const valor = input.value.replace(".", "").replace(",", ".");
  if (!valor || valor <= 0) return alert("Digite valor válido");

  const response = await fetch("/create-payment", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ amount: valor })
  });

  const data = await response.json();

  if (data.qr_code_base64) {
    document.getElementById("qr").innerHTML =
      `<img src="data:image/png;base64,${data.qr_code_base64}" width="250"/>`;
  } else {
    alert("Erro ao gerar pagamento");
  }
}
</script>

</body>
</html>
